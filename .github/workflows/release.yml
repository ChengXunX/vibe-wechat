name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
            artifact: VibeWeChat.exe
          - os: macos-latest
            type: pkg
            artifact: VibeWeChat.pkg
          - os: ubuntu-latest
            type: deb
            artifact: vibe-wechat_1.0_amd64.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build native package
        shell: bash
        run: |
          jpackage --input target \
            --main-jar vibe-wechat-1.0-SNAPSHOT.jar \
            --main-class com.chengxun.vibewechat.VibeWeChatApplication \
            --name VibeWeChat \
            --type ${{ matrix.type }} \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            ${{ matrix.type == 'exe' && '--win-menu --win-shortcut' || '' }} \
            ${{ matrix.type == 'pkg' && '--mac-package-identifier com.chengxun.vibewechat' || '' }} \
            ${{ matrix.type == 'deb' && '--linux-package-name vibe-wechat' || '' }}

      - name: List generated files
        shell: bash
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-wechat-${{ runner.os }}
          path: |
            VibeWeChat*
            vibe-wechat*.deb
            *.rpm
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
